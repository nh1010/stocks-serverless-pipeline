name: Update Code

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  STACK_NAME: StocksPipeline

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  update:
    name: Update Lambdas + Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Get stack outputs
        id: outputs
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs" \
            --output json)

          get_output() { echo "$OUTPUTS" | jq -r ".[] | select(.OutputKey==\"$1\") | .OutputValue"; }

          echo "ingestion_fn=$(get_output IngestionFunctionName)" >> "$GITHUB_OUTPUT"
          echo "api_fn=$(get_output ApiFunctionName)" >> "$GITHUB_OUTPUT"
          echo "bucket=$(get_output SiteBucketName)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(get_output DistributionId)" >> "$GITHUB_OUTPUT"
          echo "api_url=$(get_output ApiUrl)" >> "$GITHUB_OUTPUT"

      - name: Update ingestion Lambda
        run: |
          cd backend/lambdas/ingestion
          zip -r /tmp/ingestion.zip handler.py
          aws lambda update-function-code \
            --function-name ${{ steps.outputs.outputs.ingestion_fn }} \
            --zip-file fileb:///tmp/ingestion.zip

      - name: Update API Lambda
        run: |
          cd backend/lambdas/api
          zip -r /tmp/api.zip handler.py
          aws lambda update-function-code \
            --function-name ${{ steps.outputs.outputs.api_fn }} \
            --zip-file fileb:///tmp/api.zip

      - name: Build frontend
        if: hashFiles('frontend/package.json') != ''
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Sync frontend to S3
        if: hashFiles('frontend/package.json') != ''
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.outputs.outputs.bucket }}/ --delete
          aws s3 cp - s3://${{ steps.outputs.outputs.bucket }}/config.json \
            --content-type application/json \
            <<< '{"apiUrl":"${{ steps.outputs.outputs.api_url }}"}'

      - name: Invalidate CloudFront cache
        if: hashFiles('frontend/package.json') != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.distribution_id }} \
            --paths "/*"
